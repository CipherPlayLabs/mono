---
plausible_hostname: analytics.lobst3rs.com
plausible_base_url: "https://{{ plausible_hostname }}"
plausible_local_bind_address: "127.0.0.1"
plausible_local_port: 8000
plausible_runtime_user: plausible
plausible_runtime_group: plausible
plausible_root: /opt/plausible
plausible_data_root: /var/lib/plausible
plausible_backup_root: /var/backups/plausible
plausible_timezone: UTC

plausible_app_image: ghcr.io/plausible/community-edition:v2.1.4
plausible_postgres_image: postgres:16-alpine
plausible_clickhouse_image: clickhouse/clickhouse-server:24.3.3.102-alpine
plausible_postgres_db: plausible
plausible_postgres_user: plausible
plausible_postgres_password: "{{ vault_plausible_postgres_password }}"
plausible_secret_key_base: "{{ vault_plausible_secret_key_base }}"

plausible_disable_registration: true
plausible_smtp_host: ""
plausible_smtp_port: ""
plausible_smtp_user: ""
plausible_smtp_password: ""
plausible_smtp_from: ""

cloudflared_origin_url: "http://{{ plausible_local_bind_address }}:{{ plausible_local_port }}"
cloudflare_tunnel_token: "{{ vault_cloudflare_tunnel_token }}"

analytics_backup_bucket: abpiv-personal-brand-plausible-backups
analytics_backup_gcs_uri: "gs://{{ analytics_backup_bucket }}"
analytics_backup_retention_days: 30
analytics_backup_age_recipient: age1replacewithproductionrecipient0000000000000000000000000
analytics_backup_age_identity_file: /etc/plausible-backup/age.key
analytics_backup_service_account_json: /etc/plausible-backup/gcs-service-account.json
analytics_backup_gcloud_project: abpiv-personal-brand

operator_ssh_cidr_allowlist: []
firewall_allowed_tcp_ports: []
