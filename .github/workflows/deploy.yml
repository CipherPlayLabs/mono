name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'content-site/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    paths:
      - 'content-site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CONTENT_DIR: content-site
  BUILD_DIR: content-site/build
  CLOUDFLARE_PAGES_PROJECT: abpiv-personal-brand

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build website
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-build
          path: ${{ env.BUILD_DIR }}
          retention-days: 7

  deploy:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages-build
          path: ${{ env.BUILD_DIR }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ env.BUILD_DIR }}
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
