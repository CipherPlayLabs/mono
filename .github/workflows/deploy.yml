name: Deploy

on:
  push:
    branches: [main]
    paths: ['content-site/**', '.github/workflows/deploy.yml']
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: content-site

      - name: Build website
        run: npm run build
        working-directory: content-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: content-site/build

      - name: Upload build artifact (for Firebase job)
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: content-site/build
          retention-days: 7

  deploy-staging:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://allanbpediniv.com/info/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: content-site/build

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          projectId: abpiv-personal-brand
          channelId: live
          entryPoint: content-site
