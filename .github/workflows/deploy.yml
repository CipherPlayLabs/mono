name: Site and Analytics

on:
  push:
    branches: [main]
    paths:
      - 'content-site/**'
      - 'infra/analytics/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    paths:
      - 'content-site/**'
      - 'infra/analytics/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: site-and-analytics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CONTENT_DIR: content-site
  BUILD_DIR: content-site/build
  DEPLOY_DIR: content-site/cloudflare-pages
  CLOUDFLARE_PAGES_PROJECT: abpiv-personal-brand
  TOFU_DIR: infra/analytics/opentofu
  WORKER_DIR: infra/analytics/worker

jobs:
  analytics-validate:
    name: Validate analytics infrastructure
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_lobst3rs_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID_LOBST3RS }}
      TF_VAR_allanbpediniv_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID_ALLANBPEDINIV }}
      TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_gcp_region: ${{ vars.GCP_REGION }}
      TF_VAR_plausible_hostname: ${{ vars.PLAUSIBLE_HOSTNAME }}
      TF_VAR_access_allowed_email: ${{ vars.ANALYTICS_ACCESS_ALLOWED_EMAIL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID_ALLANBPEDINIV: ${{ vars.CLOUDFLARE_ZONE_ID_ALLANBPEDINIV }}
          CLOUDFLARE_ZONE_ID_LOBST3RS: ${{ vars.CLOUDFLARE_ZONE_ID_LOBST3RS }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          PLAUSIBLE_HOSTNAME: ${{ vars.PLAUSIBLE_HOSTNAME }}
          ANALYTICS_ACCESS_ALLOWED_EMAIL: ${{ vars.ANALYTICS_ACCESS_ALLOWED_EMAIL }}
          ANALYTICS_PRIMARY_SITE_DOMAIN: ${{ vars.ANALYTICS_PRIMARY_SITE_DOMAIN }}
          ANALYTICS_PROXY_ROUTE: ${{ vars.ANALYTICS_PROXY_ROUTE }}
          CLOUDFLARE_ANALYTICS_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
        run: |
          missing=0

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_ZONE_ID_ALLANBPEDINIV \
            CLOUDFLARE_ZONE_ID_LOBST3RS \
            GCP_PROJECT_ID \
            GCP_REGION \
            GCP_SERVICE_ACCOUNT \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            PLAUSIBLE_HOSTNAME \
            ANALYTICS_ACCESS_ALLOWED_EMAIL \
            ANALYTICS_PRIMARY_SITE_DOMAIN \
            ANALYTICS_PROXY_ROUTE \
            CLOUDFLARE_ANALYTICS_API_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Prepare analytics site settings
        env:
          ANALYTICS_PRIMARY_SITE_DOMAIN: ${{ vars.ANALYTICS_PRIMARY_SITE_DOMAIN }}
          ANALYTICS_PROXY_ROUTE: ${{ vars.ANALYTICS_PROXY_ROUTE }}
        run: |
          printf 'TF_VAR_analytics_sites=[{"domain":"%s","route_pattern":"%s"}]\n' \
            "$ANALYTICS_PRIMARY_SITE_DOMAIN" \
            "$ANALYTICS_PROXY_ROUTE" >> "$GITHUB_ENV"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive infra/analytics/opentofu

      - name: Initialize OpenTofu
        run: tofu -chdir=infra/analytics/opentofu init -input=false

      - name: Validate OpenTofu
        run: tofu -chdir=infra/analytics/opentofu validate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install worker dependencies
        run: npm ci
        working-directory: ${{ env.WORKER_DIR }}

      - name: Typecheck worker
        run: npm run typecheck
        working-directory: ${{ env.WORKER_DIR }}

      - name: Build worker
        run: npm run build
        working-directory: ${{ env.WORKER_DIR }}

      - name: Check worker build artifact
        run: git diff --exit-code infra/analytics/worker/dist/index.js

      - name: Test worker
        run: npm test
        working-directory: ${{ env.WORKER_DIR }}

      - name: Install content-site dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Typecheck content site
        run: npm run typecheck
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build content site
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Scan build output for blocked analytics domains
        run: |
          if rg -n "lobst3rs|analytics\.lobst3rs\.com" content-site/build; then
            echo "::error title=Blocked analytics domain found::content-site/build contains a blocked analytics domain"
            exit 1
          fi

  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build website
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Prepare Cloudflare Pages artifact
        run: |
          rm -rf cloudflare-pages
          mkdir -p cloudflare-pages/info
          cp -R build/. cloudflare-pages/info/
          cp static/_redirects cloudflare-pages/_redirects
          cp static/_headers cloudflare-pages/_headers
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-build
          path: ${{ env.DEPLOY_DIR }}
          retention-days: 7

  deploy:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages-build
          path: ${{ env.DEPLOY_DIR }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ env.DEPLOY_DIR }}
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
