name: Content Site

on:
  pull_request:
    branches: [main]
    paths:
      - 'content-site/**'
      - '.github/workflows/deploy.yml'
  push:
    branches: [preview, main]
    paths:
      - 'content-site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target.
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

permissions:
  contents: read
  deployments: write

concurrency:
  group: content-site-${{ github.event.pull_request.number || github.ref || inputs.target }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CONTENT_DIR: content-site
  DEPLOY_DIR: content-site/cloudflare-pages

jobs:
  ci:
    name: Typecheck and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build website
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

  deploy-preview:
    name: Deploy preview
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/preview') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://content-site.cipherplay.net/info/
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      SITE_URL: ${{ vars.SITE_URL }}
      PLAUSIBLE_SITE_DOMAIN: ${{ vars.PLAUSIBLE_SITE_DOMAIN }}
      DEPLOY_BRANCH: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_PAGES_PROJECT \
            SITE_URL \
            PLAUSIBLE_SITE_DOMAIN \
            CLOUDFLARE_API_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build website for preview
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Prepare Cloudflare Pages artifact
        run: |
          rm -rf cloudflare-pages
          mkdir -p cloudflare-pages/info
          cp -R build/. cloudflare-pages/info/
          cp static/_redirects cloudflare-pages/_redirects
          cp static/_headers cloudflare-pages/_headers
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ env.DEPLOY_DIR }}
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ env.DEPLOY_BRANCH }}
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'production' &&
      github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cipherplay.net/info/
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      SITE_URL: ${{ vars.SITE_URL }}
      PLAUSIBLE_SITE_DOMAIN: ${{ vars.PLAUSIBLE_SITE_DOMAIN }}
      DEPLOY_BRANCH: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_PAGES_PROJECT \
            SITE_URL \
            PLAUSIBLE_SITE_DOMAIN \
            CLOUDFLARE_API_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: content-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build website for production
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Prepare Cloudflare Pages artifact
        run: |
          rm -rf cloudflare-pages
          mkdir -p cloudflare-pages/info
          cp -R build/. cloudflare-pages/info/
          cp static/_redirects cloudflare-pages/_redirects
          cp static/_headers cloudflare-pages/_headers
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ env.DEPLOY_DIR }}
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ env.DEPLOY_BRANCH }}
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
