name: Validate CRM Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/crm/**'
      - '.github/workflows/crm-*.yml'
  pull_request:
    paths:
      - 'infra/crm/**'
      - '.github/workflows/crm-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TOFU_DIR: infra/crm/opentofu
  TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_access_auth_domain: ${{ vars.CRM_CLOUDFLARE_ACCESS_AUTH_DOMAIN || 'cipherplay.cloudflareaccess.com' }}
  TF_VAR_cloudflare_access_organization_name: ${{ vars.CRM_CLOUDFLARE_ACCESS_ORGANIZATION_NAME || 'CipherPlay Internal' }}
  TF_VAR_enable_cloudflare_edge: ${{ vars.CRM_ENABLE_CLOUDFLARE_EDGE || 'false' }}
  TF_VAR_gcp_project_id: ${{ vars.CRM_GCP_PROJECT_ID || 'cipherplay-production' }}
  TF_VAR_gcp_region: ${{ vars.CRM_GCP_REGION || 'us-east1' }}
  TF_VAR_crm_hostname: ${{ vars.CRM_HOSTNAME || 'crm.cipherinternal.com' }}
  TF_VAR_crm_zone_id: ${{ vars.CRM_ZONE_ID }}
  TF_VAR_crm_zone_name: ${{ vars.CRM_ZONE_NAME || 'cipherinternal.com' }}
  TF_VAR_crm_access_allowed_emails: ${{ vars.CRM_ACCESS_ALLOWED_EMAILS || '[]' }}
  TF_VAR_crm_access_allowed_group_ids: ${{ vars.CRM_ACCESS_ALLOWED_GROUP_IDS || '[]' }}
  TF_VAR_manage_cloudflare_access_organization: ${{ vars.CRM_MANAGE_CLOUDFLARE_ACCESS_ORGANIZATION || 'false' }}
  TF_VAR_github_oidc_principal_set: ${{ vars.CRM_GITHUB_OIDC_PRINCIPAL_SET }}
  TF_VAR_nocodb_image: ${{ vars.CRM_NOCODB_IMAGE || 'docker.io/nocodb/nocodb:latest' }}

jobs:
  validate:
    name: Validate CRM infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check optional Cloudflare configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CRM_ACCESS_ALLOWED_EMAILS: ${{ vars.CRM_ACCESS_ALLOWED_EMAILS || '[]' }}
          CRM_ACCESS_ALLOWED_GROUP_IDS: ${{ vars.CRM_ACCESS_ALLOWED_GROUP_IDS || '[]' }}
          CRM_ENABLE_CLOUDFLARE_EDGE: ${{ vars.CRM_ENABLE_CLOUDFLARE_EDGE || 'false' }}
          CRM_ZONE_ID: ${{ vars.CRM_ZONE_ID }}
          CRM_ZONE_NAME: ${{ vars.CRM_ZONE_NAME || 'cipherinternal.com' }}
        run: |
          missing=0

          if [ "$CRM_ENABLE_CLOUDFLARE_EDGE" = "true" ]; then
            if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
              echo "::error title=Missing required Cloudflare configuration::CLOUDFLARE_ACCOUNT_ID is required when CRM_ENABLE_CLOUDFLARE_EDGE is true"
              missing=1
            fi

            if [ -z "$CRM_ZONE_ID" ] && [ -z "$CRM_ZONE_NAME" ]; then
              echo "::error title=Missing required CRM Cloudflare configuration::Set CRM_ZONE_ID or CRM_ZONE_NAME when CRM_ENABLE_CLOUDFLARE_EDGE is true"
              missing=1
            fi

            if [ "$CRM_ACCESS_ALLOWED_EMAILS" = "[]" ] && [ "$CRM_ACCESS_ALLOWED_GROUP_IDS" = "[]" ]; then
              echo "::error title=Missing required CRM Access configuration::Set CRM_ACCESS_ALLOWED_EMAILS or CRM_ACCESS_ALLOWED_GROUP_IDS when CRM_ENABLE_CLOUDFLARE_EDGE is true"
              missing=1
            fi
          fi

          exit "$missing"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive ${{ env.TOFU_DIR }}

      - name: Initialize OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} init -backend=false -input=false

      - name: Validate OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} validate
