name: Analytics Infrastructure

on:
  pull_request:
    paths:
      - 'infra/analytics/**'
      - '.github/workflows/analytics-infra.yml'
      - 'content-site/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: analytics-infra-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TOFU_DIR: infra/analytics/opentofu
  WORKER_DIR: infra/analytics/worker
  CONTENT_DIR: content-site

jobs:
  validate:
    name: Validate analytics infrastructure
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_lobst3rs_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID_LOBST3RS }}
      TF_VAR_allanbpediniv_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID_ALLANBPEDINIV }}
      TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_gcp_region: ${{ vars.GCP_REGION }}
      TF_VAR_plausible_hostname: ${{ vars.PLAUSIBLE_HOSTNAME }}
      TF_VAR_access_allowed_email: ${{ vars.ANALYTICS_ACCESS_ALLOWED_EMAIL }}
      TF_VAR_analytics_sites: '[{"domain":"${{ vars.ANALYTICS_PRIMARY_SITE_DOMAIN }}","route_pattern":"${{ vars.ANALYTICS_PROXY_ROUTE }}"}]'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID_ALLANBPEDINIV: ${{ vars.CLOUDFLARE_ZONE_ID_ALLANBPEDINIV }}
          CLOUDFLARE_ZONE_ID_LOBST3RS: ${{ vars.CLOUDFLARE_ZONE_ID_LOBST3RS }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          PLAUSIBLE_HOSTNAME: ${{ vars.PLAUSIBLE_HOSTNAME }}
          ANALYTICS_ACCESS_ALLOWED_EMAIL: ${{ vars.ANALYTICS_ACCESS_ALLOWED_EMAIL }}
          ANALYTICS_PRIMARY_SITE_DOMAIN: ${{ vars.ANALYTICS_PRIMARY_SITE_DOMAIN }}
          ANALYTICS_PROXY_ROUTE: ${{ vars.ANALYTICS_PROXY_ROUTE }}
          CLOUDFLARE_ANALYTICS_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
        run: |
          missing=0

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_ZONE_ID_ALLANBPEDINIV \
            CLOUDFLARE_ZONE_ID_LOBST3RS \
            GCP_PROJECT_ID \
            GCP_REGION \
            GCP_SERVICE_ACCOUNT \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            PLAUSIBLE_HOSTNAME \
            ANALYTICS_ACCESS_ALLOWED_EMAIL \
            ANALYTICS_PRIMARY_SITE_DOMAIN \
            ANALYTICS_PROXY_ROUTE \
            CLOUDFLARE_ANALYTICS_API_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive infra/analytics/opentofu

      - name: Initialize OpenTofu
        run: tofu -chdir=infra/analytics/opentofu init -input=false

      - name: Validate OpenTofu
        run: tofu -chdir=infra/analytics/opentofu validate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install worker dependencies
        run: npm ci
        working-directory: ${{ env.WORKER_DIR }}

      - name: Typecheck worker
        run: npm run typecheck
        working-directory: ${{ env.WORKER_DIR }}

      - name: Test worker
        run: npm test
        working-directory: ${{ env.WORKER_DIR }}

      - name: Install content-site dependencies
        run: npm ci
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Typecheck content site
        run: npm run typecheck
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Build content site
        run: npm run build
        working-directory: ${{ env.CONTENT_DIR }}

      - name: Scan build output for blocked analytics domains
        run: |
          if rg -n "lobst3rs|analytics\.lobst3rs\.com" content-site/build; then
            echo "::error title=Blocked analytics domain found::content-site/build contains a blocked analytics domain"
            exit 1
          fi
