name: Apply CRM Schema

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: Type apply-schema to apply the CRM SQL schema.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: crm-schema-apply
  cancel-in-progress: false

env:
  CRM_DATABASE: ${{ vars.CRM_DATABASE || 'crm' }}
  CRM_DATABASE_USER: ${{ vars.CRM_DATABASE_USER || 'crm_writer' }}
  CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
  CRM_GCP_REGION: ${{ vars.CRM_GCP_REGION || 'us-east1' }}
  CRM_CLOUD_SQL_CONNECTION_NAME: ${{ vars.CRM_CLOUD_SQL_CONNECTION_NAME || 'cipherplay-production:us-east1:cipherplay-crm-postgres' }}
  CRM_POSTGRES_PASSWORD_SECRET: ${{ vars.CRM_POSTGRES_PASSWORD_SECRET || 'cipherplay-crm-postgres-password' }}
  CRM_SCHEMA_PATH: infra/crm/schema/001-crm.sql

jobs:
  apply-schema:
    if: inputs.confirm_apply == 'apply-schema'
    name: Apply CRM SQL schema
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
          CRM_GCP_SERVICE_ACCOUNT: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}
          CRM_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          missing=0

          for name in \
            CRM_GCP_PROJECT_ID \
            CRM_GCP_SERVICE_ACCOUNT \
            CRM_GCP_WORKLOAD_IDENTITY_PROVIDER
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.2/cloud-sql-proxy.linux.amd64" \
            -o cloud-sql-proxy
          chmod +x cloud-sql-proxy

      - name: Apply schema
        run: |
          set -euo pipefail

          export PGPASSWORD="$(
            gcloud secrets versions access latest \
              --project="${CRM_GCP_PROJECT_ID}" \
              --secret="${CRM_POSTGRES_PASSWORD_SECRET}"
          )"

          ./cloud-sql-proxy "${CRM_CLOUD_SQL_CONNECTION_NAME}" \
            --address 127.0.0.1 \
            --port 5432 \
            --quiet &

          proxy_pid="$!"
          trap 'kill "$proxy_pid"' EXIT

          for attempt in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -d "${CRM_DATABASE}" -U "${CRM_DATABASE_USER}" >/dev/null 2>&1; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "::error title=Cloud SQL proxy unavailable::Timed out waiting for local proxy"
              exit 1
            fi

            sleep 1
          done

          psql \
            "host=127.0.0.1 port=5432 dbname=${CRM_DATABASE} user=${CRM_DATABASE_USER} sslmode=disable" \
            --set ON_ERROR_STOP=1 \
            --file "${CRM_SCHEMA_PATH}"

      - name: Verify Founder Institute table
        run: |
          set -euo pipefail

          export PGPASSWORD="$(
            gcloud secrets versions access latest \
              --project="${CRM_GCP_PROJECT_ID}" \
              --secret="${CRM_POSTGRES_PASSWORD_SECRET}"
          )"

          ./cloud-sql-proxy "${CRM_CLOUD_SQL_CONNECTION_NAME}" \
            --address 127.0.0.1 \
            --port 5432 \
            --quiet &

          proxy_pid="$!"
          trap 'kill "$proxy_pid"' EXIT

          for attempt in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -d "${CRM_DATABASE}" -U "${CRM_DATABASE_USER}" >/dev/null 2>&1; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "::error title=Cloud SQL proxy unavailable::Timed out waiting for local proxy"
              exit 1
            fi

            sleep 1
          done

          psql \
            "host=127.0.0.1 port=5432 dbname=${CRM_DATABASE} user=${CRM_DATABASE_USER} sslmode=disable" \
            --set ON_ERROR_STOP=1 \
            --tuples-only \
            --command "
              select table_name
              from information_schema.tables
              where table_schema = 'public'
                and table_name = 'crm_founder_institute_directory_entries';

              select indexname
              from pg_indexes
              where schemaname = 'public'
                and tablename = 'crm_founder_institute_directory_entries'
              order by indexname;
            "
