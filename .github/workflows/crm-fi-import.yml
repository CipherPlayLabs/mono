name: Import Founder Institute CRM Data

on:
  workflow_dispatch:
    inputs:
      confirm_import:
        description: Type import-fi to collect and import Founder Institute CRM data.
        required: true
        type: string
      max_pages:
        description: Maximum pages per specialization filter.
        required: false
        default: "100"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: crm-fi-import
  cancel-in-progress: false

env:
  CRM_DATABASE: ${{ vars.CRM_DATABASE || 'crm' }}
  CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
  CRM_GCP_REGION: ${{ vars.CRM_GCP_REGION || 'us-east1' }}
  CRM_CLOUD_SQL_INSTANCE: ${{ vars.CRM_CLOUD_SQL_INSTANCE || 'cipherplay-crm-postgres' }}
  CRM_SCHEMA_IMPORT_BUCKET: ${{ vars.CRM_SCHEMA_IMPORT_BUCKET || 'cipherplay-production-opentofu-state' }}
  FI_IMPORT_SQL_PATH: infra/crm/private/founder-institute-import.sql

jobs:
  import-fi:
    if: inputs.confirm_import == 'import-fi'
    name: Import Founder Institute data
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
          CRM_GCP_SERVICE_ACCOUNT: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}
          CRM_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          FI_COOKIE: ${{ secrets.FI_COOKIE }}
        run: |
          missing=0

          for name in \
            CRM_GCP_PROJECT_ID \
            CRM_GCP_SERVICE_ACCOUNT \
            CRM_GCP_WORKLOAD_IDENTITY_PROVIDER \
            FI_COOKIE
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Run importer
        env:
          FI_COOKIE: ${{ secrets.FI_COOKIE }}
        run: |
          set -euo pipefail

          python -m infra.crm.importers.founder_institute \
            --output-sql "${FI_IMPORT_SQL_PATH}" \
            --max-pages "${{ inputs.max_pages }}" \
            --pause-seconds 0.25

          wc -c "${FI_IMPORT_SQL_PATH}"

      - name: Import generated SQL
        run: |
          set -euo pipefail

          import_object="gs://${CRM_SCHEMA_IMPORT_BUCKET}/crm-fi-import/${GITHUB_RUN_ID}/founder-institute-import.sql"
          cloud_sql_service_account="$(
            gcloud sql instances describe "${CRM_CLOUD_SQL_INSTANCE}" \
              --project="${CRM_GCP_PROJECT_ID}" \
              --format='value(serviceAccountEmailAddress)'
          )"
          bucket_uri="gs://${CRM_SCHEMA_IMPORT_BUCKET}"

          cleanup() {
            gcloud storage rm "${import_object}" \
              --project="${CRM_GCP_PROJECT_ID}" \
              --quiet || true

            gcloud storage buckets remove-iam-policy-binding "${bucket_uri}" \
              --member="serviceAccount:${cloud_sql_service_account}" \
              --role="roles/storage.objectViewer" \
              --project="${CRM_GCP_PROJECT_ID}" \
              --quiet || true
          }
          trap cleanup EXIT

          gcloud storage cp "${FI_IMPORT_SQL_PATH}" "${import_object}" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --quiet

          gcloud storage buckets add-iam-policy-binding "${bucket_uri}" \
            --member="serviceAccount:${cloud_sql_service_account}" \
            --role="roles/storage.objectViewer" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --quiet

          gcloud sql import sql "${CRM_CLOUD_SQL_INSTANCE}" "${import_object}" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --database="${CRM_DATABASE}" \
            --quiet

      - name: Verify import target
        run: |
          gcloud sql databases describe "${CRM_DATABASE}" \
            --instance="${CRM_CLOUD_SQL_INSTANCE}" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --format='value(name)'
