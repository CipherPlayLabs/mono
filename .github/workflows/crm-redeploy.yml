name: Redeploy CRM

on:
  workflow_dispatch:
    inputs:
      confirm_redeploy:
        description: Type redeploy to update Cloud Run to the configured NocoDB image.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: crm-redeploy
  cancel-in-progress: false

env:
  CRM_IMAGE: ${{ vars.CRM_NOCODB_IMAGE || 'docker.io/nocodb/nocodb:latest' }}
  CRM_CLOUD_RUN_SERVICE: ${{ vars.CRM_CLOUD_RUN_SERVICE || 'cipherplay-crm' }}
  CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
  CRM_GCP_REGION: ${{ vars.CRM_GCP_REGION }}

jobs:
  redeploy:
    if: inputs.confirm_redeploy == 'redeploy'
    name: Redeploy CRM Cloud Run service
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check required configuration
        env:
          CRM_GCP_PROJECT_ID: ${{ vars.CRM_GCP_PROJECT_ID }}
          CRM_GCP_REGION: ${{ vars.CRM_GCP_REGION }}
          CRM_GCP_SERVICE_ACCOUNT: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}
          CRM_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          missing=0

          for name in \
            CRM_GCP_PROJECT_ID \
            CRM_GCP_REGION \
            CRM_GCP_SERVICE_ACCOUNT \
            CRM_GCP_WORKLOAD_IDENTITY_PROVIDER
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.CRM_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CRM_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Redeploy NocoDB image
        run: |
          gcloud run services update "${CRM_CLOUD_RUN_SERVICE}" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --region="${CRM_GCP_REGION}" \
            --image="${CRM_IMAGE}" \
            --quiet

      - name: Show deployed image
        run: |
          gcloud run services describe "${CRM_CLOUD_RUN_SERVICE}" \
            --project="${CRM_GCP_PROJECT_ID}" \
            --region="${CRM_GCP_REGION}" \
            --format='value(spec.template.spec.containers[0].image)'
