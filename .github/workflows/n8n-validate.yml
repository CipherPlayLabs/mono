name: Validate n8n Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/n8n/**'
      - '.github/workflows/n8n-*.yml'
  pull_request:
    paths:
      - 'infra/n8n/**'
      - '.github/workflows/n8n-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: n8n-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TOFU_DIR: infra/n8n/opentofu
  TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cipherplay_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID_CIPHERPLAY }}
  TF_VAR_enable_cloudflare_edge: ${{ vars.N8N_ENABLE_CLOUDFLARE_EDGE || 'false' }}
  TF_VAR_gcp_project_id: ${{ vars.N8N_GCP_PROJECT_ID }}
  TF_VAR_gcp_region: ${{ vars.N8N_GCP_REGION }}
  TF_VAR_editor_hostname: ${{ vars.N8N_EDITOR_HOSTNAME }}
  TF_VAR_editor_zone_id: ${{ vars.N8N_EDITOR_ZONE_ID }}
  TF_VAR_editor_zone_name: ${{ vars.N8N_EDITOR_ZONE_NAME }}
  TF_VAR_editor_access_allowed_emails: ${{ vars.N8N_EDITOR_ACCESS_ALLOWED_EMAILS || '[]' }}
  TF_VAR_editor_access_allowed_group_ids: ${{ vars.N8N_EDITOR_ACCESS_ALLOWED_GROUP_IDS || '[]' }}
  TF_VAR_github_oidc_principal_set: ${{ vars.N8N_GITHUB_OIDC_PRINCIPAL_SET }}

jobs:
  validate:
    name: Validate n8n infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID_CIPHERPLAY: ${{ vars.CLOUDFLARE_ZONE_ID_CIPHERPLAY }}
          N8N_ENABLE_CLOUDFLARE_EDGE: ${{ vars.N8N_ENABLE_CLOUDFLARE_EDGE || 'false' }}
          N8N_EDITOR_ACCESS_ALLOWED_EMAILS: ${{ vars.N8N_EDITOR_ACCESS_ALLOWED_EMAILS || '[]' }}
          N8N_EDITOR_ACCESS_ALLOWED_GROUP_IDS: ${{ vars.N8N_EDITOR_ACCESS_ALLOWED_GROUP_IDS || '[]' }}
          N8N_EDITOR_HOSTNAME: ${{ vars.N8N_EDITOR_HOSTNAME }}
          N8N_EDITOR_ZONE_ID: ${{ vars.N8N_EDITOR_ZONE_ID }}
          N8N_EDITOR_ZONE_NAME: ${{ vars.N8N_EDITOR_ZONE_NAME }}
          N8N_GCP_PROJECT_ID: ${{ vars.N8N_GCP_PROJECT_ID }}
          N8N_GCP_REGION: ${{ vars.N8N_GCP_REGION }}
          N8N_GCP_SERVICE_ACCOUNT: ${{ vars.N8N_GCP_SERVICE_ACCOUNT }}
          N8N_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.N8N_GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          missing=0

          for name in \
            N8N_GCP_PROJECT_ID \
            N8N_GCP_REGION \
            N8N_GCP_SERVICE_ACCOUNT \
            N8N_GCP_WORKLOAD_IDENTITY_PROVIDER
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          if [ "$N8N_ENABLE_CLOUDFLARE_EDGE" = "true" ]; then
            for name in \
              CLOUDFLARE_ACCOUNT_ID \
              CLOUDFLARE_ZONE_ID_CIPHERPLAY
            do
              if [ -z "${!name}" ]; then
                echo "::error title=Missing required Cloudflare configuration::$name is required when N8N_ENABLE_CLOUDFLARE_EDGE is true"
                missing=1
              fi
            done

            if [ -n "$N8N_EDITOR_HOSTNAME" ]; then
              if [ -z "$N8N_EDITOR_ZONE_ID" ] && [ -z "$N8N_EDITOR_ZONE_NAME" ]; then
                echo "::error title=Missing required editor Cloudflare configuration::Set N8N_EDITOR_ZONE_ID or N8N_EDITOR_ZONE_NAME when N8N_EDITOR_HOSTNAME is configured"
                missing=1
              fi

              if [ "$N8N_EDITOR_ACCESS_ALLOWED_EMAILS" = "[]" ] && [ "$N8N_EDITOR_ACCESS_ALLOWED_GROUP_IDS" = "[]" ]; then
                echo "::error title=Missing required editor Access configuration::Set N8N_EDITOR_ACCESS_ALLOWED_EMAILS or N8N_EDITOR_ACCESS_ALLOWED_GROUP_IDS when N8N_EDITOR_HOSTNAME is configured"
                missing=1
              fi
            fi
          fi

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.N8N_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.N8N_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive ${{ env.TOFU_DIR }}

      - name: Initialize OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} init -input=false

      - name: Validate OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} validate
