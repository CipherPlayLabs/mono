name: Validate Research Data Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/research-data/**'
      - '.github/workflows/research-data-*.yml'
  pull_request:
    paths:
      - 'infra/research-data/**'
      - '.github/workflows/research-data-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: research-data-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TOFU_DIR: infra/research-data/opentofu
  PYTHONPATH: infra/research-data/jobs
  TF_VAR_gcp_project_id: ${{ vars.RESEARCH_DATA_GCP_PROJECT_ID || 'cipherplay-production' }}
  TF_VAR_gcp_region: ${{ vars.RESEARCH_DATA_GCP_REGION || 'us-east1' }}
  TF_VAR_bigquery_location: ${{ vars.RESEARCH_DATA_BIGQUERY_LOCATION || 'US' }}
  TF_VAR_bigquery_dataset_id: ${{ vars.RESEARCH_DATA_BIGQUERY_DATASET_ID || 'research_data' }}
  TF_VAR_research_data_jobs_image: ${{ vars.RESEARCH_DATA_JOBS_IMAGE || 'us-docker.pkg.dev/cloudrun/container/hello' }}
  TF_VAR_collection_config_uri: ${{ vars.RESEARCH_DATA_COLLECTION_CONFIG_URI }}
  TF_VAR_collection_scheduler_paused: ${{ vars.RESEARCH_DATA_COLLECTION_SCHEDULER_PAUSED || 'true' }}
  TF_VAR_triage_schedule: ${{ vars.RESEARCH_DATA_TRIAGE_SCHEDULE || '*/30 * * * *' }}
  TF_VAR_triage_scheduler_paused: ${{ vars.RESEARCH_DATA_TRIAGE_SCHEDULER_PAUSED || 'false' }}
  TF_VAR_github_oidc_principal_set: ${{ vars.RESEARCH_DATA_GITHUB_OIDC_PRINCIPAL_SET }}

jobs:
  validate:
    name: Validate research data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python unit tests
        run: python -m unittest discover -s infra/research-data/jobs/tests -p 'test*.py' -v

      - name: Validate example JSON config
        run: python -m research_data validate-config --config-uri infra/research-data/examples/collection-run-config.example.json

      - name: Check required GCP auth configuration
        env:
          RESEARCH_DATA_GCP_SERVICE_ACCOUNT: ${{ vars.RESEARCH_DATA_GCP_SERVICE_ACCOUNT }}
          RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          missing=0

          for name in \
            RESEARCH_DATA_GCP_SERVICE_ACCOUNT \
            RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.RESEARCH_DATA_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive ${{ env.TOFU_DIR }}

      - name: Initialize OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} init -input=false

      - name: Validate OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} validate
