name: Provision Analytics Host

on:
  workflow_dispatch:
    inputs:
      confirm_provision:
        description: Type provision to configure the analytics VM.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: analytics-host-provision
  cancel-in-progress: false

env:
  GCP_ZONE: us-east1-b

jobs:
  provision:
    if: inputs.confirm_provision == 'provision'
    name: Provision Plausible and cloudflared
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || vars.N8N_GCP_PROJECT_ID || 'cipherplay-production' }}
      PLAUSIBLE_HOSTNAME: ${{ vars.PLAUSIBLE_HOSTNAME || 'analytics.cipherinternal.com' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_TUNNEL_ID: ${{ vars.ANALYTICS_CLOUDFLARE_TUNNEL_ID }}
      CLOUDFLARE_TUNNEL_NAME: ${{ vars.ANALYTICS_CLOUDFLARE_TUNNEL_NAME || 'plausible-analytics-origin' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required analytics host configuration
        env:
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT || vars.N8N_GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.N8N_GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          missing=0

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_TUNNEL_NAME \
            GCP_PROJECT_ID \
            GCP_SERVICE_ACCOUNT \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_ZONE \
            PLAUSIBLE_HOSTNAME
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing analytics host configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.N8N_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT || vars.N8N_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Fetch Cloudflare tunnel token
        run: |
          tunnel_id="$CLOUDFLARE_TUNNEL_ID"

          if [ -z "$tunnel_id" ]; then
            encoded_tunnel_name="$(jq -nr --arg v "$CLOUDFLARE_TUNNEL_NAME" '$v|@uri')"
            tunnels_response="$(curl -fsS \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel?name=${encoded_tunnel_name}&is_deleted=false" \
              --request GET \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json")"

            tunnel_id="$(jq -er --arg name "$CLOUDFLARE_TUNNEL_NAME" '[.result[] | select(.name == $name) | .id][0]' <<< "$tunnels_response")"
          fi

          response="$(curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel/${tunnel_id}/token" \
            --request GET \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json")"

          token="$(jq -er '.result' <<< "$response")"
          echo "::add-mask::$token"
          printf 'TUNNEL_TOKEN=%s\n' "$token" >> "$GITHUB_ENV"

      - name: Install tunnel token on host
        run: |
          printf 'TUNNEL_TOKEN=%s\n' "$TUNNEL_TOKEN" | \
            gcloud compute ssh plausible-analytics-vm \
              --project="${GCP_PROJECT_ID}" \
              --zone="${GCP_ZONE}" \
              --tunnel-through-iap \
              --quiet \
              --command='sudo install -d -m 0700 /etc/cloudflared && sudo tee /etc/cloudflared/token.env >/dev/null && sudo chmod 0600 /etc/cloudflared/token.env'

      - name: Provision Plausible host
        run: |
          gcloud compute ssh plausible-analytics-vm \
            --project="${GCP_PROJECT_ID}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command='sudo PLAUSIBLE_HOSTNAME="'"${PLAUSIBLE_HOSTNAME}"'" bash -s' <<'REMOTE'
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive
          rm -f /etc/apt/sources.list.d/cloudflared.list

          if [ -f /etc/apt/sources.list ]; then
            sed -i 's|http://|https://|g' /etc/apt/sources.list
            sed -i 's|[a-z0-9.-]*\.gce\.archive\.ubuntu\.com|archive.ubuntu.com|g' /etc/apt/sources.list
          fi

          if [ -d /etc/apt/sources.list.d ]; then
            find /etc/apt/sources.list.d -type f -name '*.list' -o -name '*.sources' | while read -r source_file; do
              sed -i 's|http://|https://|g' "$source_file"
              sed -i 's|[a-z0-9.-]*\.gce\.archive\.ubuntu\.com|archive.ubuntu.com|g' "$source_file"
            done
          fi

          apt-get update
          apt-get install -y ca-certificates curl gnupg lsb-release openssl ufw

          install -d -m 0755 /etc/apt/keyrings

          curl -fsSL "https://download.docker.com/linux/ubuntu/gpg" -o /etc/apt/keyrings/docker.asc
          chmod 0644 /etc/apt/keyrings/docker.asc
          . /etc/os-release
          arch="$(dpkg --print-architecture)"
          printf 'deb [arch=%s signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu %s stable\n' "$arch" "$VERSION_CODENAME" > /etc/apt/sources.list.d/docker.list

          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

          curl -fsSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-${arch}.deb" \
            -o /tmp/cloudflared.deb
          apt-get install -y /tmp/cloudflared.deb

          systemctl enable --now docker

          install -d -m 0750 /opt/plausible
          install -d -m 0750 /opt/plausible/clickhouse
          install -d -m 0750 /var/lib/plausible/tmp

          if [ -f /opt/plausible/docker-compose.yml ] &&
            grep -q 'clickhouse/clickhouse-server:24\.8' /opt/plausible/docker-compose.yml; then
            docker compose --project-directory /opt/plausible down -v || true
          fi

          if [ -f /opt/plausible/runtime-secrets.env ] &&
            ! grep -Eq '^POSTGRES_PASSWORD=[A-Za-z0-9._~-]+$' /opt/plausible/runtime-secrets.env; then
            docker compose --project-directory /opt/plausible down -v || true
            rm -f /opt/plausible/runtime-secrets.env
          fi

          if [ ! -f /opt/plausible/runtime-secrets.env ]; then
            {
              printf 'POSTGRES_PASSWORD=%s\n' "$(openssl rand -hex 32)"
              printf 'SECRET_KEY_BASE=%s\n' "$(openssl rand -hex 64)"
            } > /opt/plausible/runtime-secrets.env
            chmod 0640 /opt/plausible/runtime-secrets.env
          fi

          set -a
          . /opt/plausible/runtime-secrets.env
          set +a

          cat > /opt/plausible/plausible.env <<EOF
          BASE_URL=https://${PLAUSIBLE_HOSTNAME}
          SECRET_KEY_BASE=${SECRET_KEY_BASE}
          DISABLE_REGISTRATION=true
          TMPDIR=/var/lib/plausible/tmp
          TZ=UTC
          DATABASE_URL=postgres://plausible:${POSTGRES_PASSWORD}@postgres:5432/plausible
          CLICKHOUSE_DATABASE_URL=http://clickhouse:8123/plausible_events_db
          SMTP_HOST=
          SMTP_PORT=
          SMTP_USER_NAME=
          SMTP_USER_PWD=
          SMTP_HOST_ADDR=
          EOF
          chmod 0640 /opt/plausible/plausible.env

          cat > /opt/plausible/clickhouse/logs.xml <<'EOF'
          <clickhouse>
              <logger>
                  <level>warning</level>
                  <console>true</console>
              </logger>

              <query_log replace="1">
                  <database>system</database>
                  <table>query_log</table>
                  <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                  <engine>
                      ENGINE = MergeTree
                      PARTITION BY event_date
                      ORDER BY (event_time)
                      TTL event_date + interval 30 day
                      SETTINGS ttl_only_drop_parts=1
                  </engine>
              </query_log>

              <metric_log remove="remove" />
              <asynchronous_metric_log remove="remove" />
              <query_thread_log remove="remove" />
              <text_log remove="remove" />
              <trace_log remove="remove" />
              <session_log remove="remove" />
              <part_log remove="remove" />
          </clickhouse>
          EOF

          cat > /opt/plausible/clickhouse/ipv4-only.xml <<'EOF'
          <clickhouse>
              <listen_host>0.0.0.0</listen_host>
          </clickhouse>
          EOF

          cat > /opt/plausible/clickhouse/low-resources.xml <<'EOF'
          <clickhouse>
              <mark_cache_size>524288000</mark_cache_size>

              <profile>
                  <default>
                      <max_threads>1</max_threads>
                      <max_block_size>8192</max_block_size>
                      <max_download_threads>1</max_download_threads>
                      <input_format_parallel_parsing>0</input_format_parallel_parsing>
                      <output_format_parallel_formatting>0</output_format_parallel_formatting>
                  </default>
              </profile>
          </clickhouse>
          EOF
          chmod 0640 /opt/plausible/clickhouse/*.xml

          cat > /opt/plausible/docker-compose.yml <<EOF
          services:
            plausible:
              image: ghcr.io/plausible/community-edition:v2.1.4
              restart: unless-stopped
              command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
              depends_on:
                postgres:
                  condition: service_healthy
                clickhouse:
                  condition: service_healthy
              env_file:
                - ./plausible.env
              ports:
                - "127.0.0.1:8000:8000"
              volumes:
                - plausible_data:/var/lib/plausible
              ulimits:
                nofile:
                  soft: 65535
                  hard: 65535
              environment:
                ERL_FLAGS: "+sbwt none +sbwtdcpu none +sbwtdio none"

            postgres:
              image: postgres:16-alpine
              restart: unless-stopped
              environment:
                POSTGRES_DB: plausible
                POSTGRES_USER: plausible
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
                interval: 10s
                timeout: 5s
                retries: 5
              volumes:
                - postgres_data:/var/lib/postgresql/data

            clickhouse:
              image: clickhouse/clickhouse-server:24.3.3.102-alpine
              restart: unless-stopped
              ulimits:
                nofile:
                  soft: 262144
                  hard: 262144
              healthcheck:
                test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 1m
              volumes:
                - clickhouse_data:/var/lib/clickhouse
                - clickhouse_logs:/var/log/clickhouse-server
                - clickhouse_backups:/backups
                - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
                - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
                - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro

          volumes:
            plausible_data:
            postgres_data:
            clickhouse_data:
            clickhouse_logs:
            clickhouse_backups:
          EOF
          chmod 0640 /opt/plausible/docker-compose.yml

          cat > /etc/systemd/system/cloudflared.service <<'EOF'
          [Unit]
          Description=Cloudflare Tunnel for Plausible analytics dashboard
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          EnvironmentFile=/etc/cloudflared/token.env
          ExecStart=/usr/bin/cloudflared tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
          Restart=always
          RestartSec=5s
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full
          ProtectHome=true

          [Install]
          WantedBy=multi-user.target
          EOF

          ufw default deny incoming
          ufw default allow outgoing
          ufw allow from 35.235.240.0/20 to any port 22 proto tcp
          ufw --force enable

          systemctl daemon-reload
          systemctl enable --now cloudflared
          docker compose --project-directory /opt/plausible up -d

          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null http://127.0.0.1:8000; then
              systemctl is-active --quiet cloudflared
              docker compose --project-directory /opt/plausible ps
              exit 0
            fi
            sleep 5
          done

          systemctl --no-pager --full status cloudflared || true
          docker compose --project-directory /opt/plausible ps || true
          docker compose --project-directory /opt/plausible logs --tail=200 || true
          exit 1
          REMOTE
