name: Apply Research Data Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: Type apply to create or update research data infrastructure.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: research-data-infra-apply
  cancel-in-progress: false

env:
  TOFU_DIR: infra/research-data/opentofu
  TF_VAR_gcp_project_id: ${{ vars.RESEARCH_DATA_GCP_PROJECT_ID || 'cipherplay-production' }}
  TF_VAR_gcp_region: ${{ vars.RESEARCH_DATA_GCP_REGION || 'us-east1' }}
  TF_VAR_bigquery_location: ${{ vars.RESEARCH_DATA_BIGQUERY_LOCATION || 'US' }}
  TF_VAR_bigquery_dataset_id: ${{ vars.RESEARCH_DATA_BIGQUERY_DATASET_ID || 'research_data' }}
  TF_VAR_snapshot_bucket_name: ${{ vars.RESEARCH_DATA_SNAPSHOT_BUCKET_NAME }}
  TF_VAR_reddit_credentials_secret_id: ${{ vars.RESEARCH_DATA_REDDIT_CREDENTIALS_SECRET_ID || 'reddit-api-credentials' }}
  TF_VAR_research_data_jobs_image: ${{ vars.RESEARCH_DATA_JOBS_IMAGE }}
  TF_VAR_collection_config_uri: ${{ vars.RESEARCH_DATA_COLLECTION_CONFIG_URI }}
  TF_VAR_collection_run_id: ${{ vars.RESEARCH_DATA_COLLECTION_RUN_ID }}
  TF_VAR_collection_query_mode: ${{ vars.RESEARCH_DATA_COLLECTION_QUERY_MODE }}
  TF_VAR_collection_schedule: ${{ vars.RESEARCH_DATA_COLLECTION_SCHEDULE || '*/30 * * * *' }}
  TF_VAR_collection_scheduler_paused: ${{ vars.RESEARCH_DATA_COLLECTION_SCHEDULER_PAUSED || 'true' }}
  TF_VAR_github_oidc_principal_set: ${{ vars.RESEARCH_DATA_GITHUB_OIDC_PRINCIPAL_SET }}

jobs:
  apply:
    if: inputs.confirm_apply == 'apply'
    name: Apply research data infrastructure
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          RESEARCH_DATA_GCP_SERVICE_ACCOUNT: ${{ vars.RESEARCH_DATA_GCP_SERVICE_ACCOUNT }}
          RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          RESEARCH_DATA_JOBS_IMAGE: ${{ vars.RESEARCH_DATA_JOBS_IMAGE }}
        run: |
          missing=0

          for name in \
            RESEARCH_DATA_GCP_SERVICE_ACCOUNT \
            RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER \
            RESEARCH_DATA_JOBS_IMAGE
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.RESEARCH_DATA_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.RESEARCH_DATA_GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Initialize OpenTofu
        run: tofu -chdir=${{ env.TOFU_DIR }} init -input=false

      - name: Plan research data infrastructure
        run: tofu -chdir=${{ env.TOFU_DIR }} plan -input=false -out=tfplan

      - name: Apply research data infrastructure
        run: tofu -chdir=${{ env.TOFU_DIR }} apply -input=false -auto-approve tfplan

      - name: Show research data outputs
        run: tofu -chdir=${{ env.TOFU_DIR }} output
